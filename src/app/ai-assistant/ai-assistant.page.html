<ion-header [translucent]="true">
  <ion-toolbar><ion-title>AI Assistant</ion-title></ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <main class="mobile-page assistant-page">
    <section class="assistant-card" aria-labelledby="assistant-heading">
      <div class="assistant-icon" aria-hidden="true"><ion-icon name="sparkles-outline"></ion-icon></div>
      <p class="section-kicker">Llenroc intelligence</p>
      <h1 class="page-heading" id="assistant-heading">A secure mobile AI experience is <span>coming soon</span></h1>
      <p class="page-lead">We’re designing a focused assistant to help you explore Llenroc Tech services and technology insights from your mobile device.</p>
      <div class="security-note">
        <ion-icon name="lock-closed-outline" aria-hidden="true"></ion-icon>
        <p>No prompts or data are sent from this preview.</p>
      </div>
    </section>
  </main>
</ion-content>
